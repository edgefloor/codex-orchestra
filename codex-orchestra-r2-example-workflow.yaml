apiVersion: orchestra.openai/v2alpha1
kind: Workflow
metadata:
  name: orchestra-r2-bootstrap
  description: Build the first production slice of the Codex-native Orchestra R2 control plane.
  labels:
    repo: codex-orchestra
    risk: high
spec:
  objective: Implement a durable Codex App Server orchestration kernel with isolated writer worktrees, structured
    graph deltas, verification gates, and restart-safe reconciliation.
  acceptanceCriteria:
  - The runtime can start, resume, steer, interrupt, and observe Codex turns through a version-probed adapter.
  - Every writer attempt runs in a dedicated Git worktree pinned to a recorded base commit.
  - A process crash can be followed by deterministic reconciliation without duplicate dispatch or lost approval
    state.
  - Graph expansion is schema-valid, acyclic, budget-bounded, policy-admitted, and auditable.
  - Unit, contract, restart, and end-to-end tests pass.
  inputs:
    repository: .
    baseRef: HEAD
    sourceArtifacts:
    - codex-rs
    - symphony
    - sdk
    - codex-orchestra-framework
  budgets:
    maxNodes: 40
    maxActiveTurns: 8
    maxWriterAttempts: 3
    verificationReserve: 2
    mergeReserve: 1
    maxAttemptsPerNode: 3
    tokenBudget: 600000
    wallTimeSeconds: 43200
  policies:
    defaultForkPolicy: none
    defaultSubagentDepth: 1
    writeIsolation: required
    graphAdmission: deterministic
    secretDelivery: brokered-tools-only
    irreversibleActionGate: human
    allowExperimentalCodexApis: false
    allowedToolNamespaces:
    - filesystem
    - git
    - tests
    - orchestra
  graph:
    allowDynamicExpansion: true
    maxDynamicNodesPerDelta: 12
    nodes:
    - id: capability_probe
      kind: tool
      objective: Generate the installed App Server schemas, read effective config, list models, and persist a capability
        profile.
      produces:
      - name: capability-profile
        mediaType: application/json
        contentAddressed: true
        retention: project
      workspace:
        mode: read_only_snapshot
        baseRef: HEAD
        readOnly: true
        cleanup: on_success
      retry:
        maxAttempts: 2
        backoff: exponential
        baseDelaySeconds: 2
        retryOn:
        - infrastructure
        - timeout
    - id: ground_architecture
      kind: plan
      objective: Convert the accepted R2 architecture into a bounded implementation graph and emit a GraphDelta
        proposal.
      dependsOn:
      - capability_probe
      inputs:
      - from: capability_probe
        name: capability-profile
        required: true
      execution:
        provider: codex
        role: planner
        modelProfile: deep_reasoning
        threadPolicy: fresh
        forkPolicy: none
        sandbox: read_only
        approvalProfile: deny_side_effects
        subagents:
          mode: read_only
          maxThreads: 4
          maxDepth: 1
          requireExplicitForkNone: true
          allowedRoles:
          - explorer
          - reviewer
      context:
        strategy: manifest
        includeArtifacts:
        - capability-profile
        includeDecisions: true
        includeRawTranscript: false
        maxInputTokens: 30000
      mayProposeGraphDelta: true
      nodeBudget:
        tokenBudget: 60000
        wallTimeSeconds: 3600
        maxSubagents: 6
      assurance:
        risk: high
        requiredGates:
        - graph-schema
        - graph-admission
        independentReviewer: true
        independentVerifier: false
        evidenceRequired: true
      produces:
      - name: graph-delta
        mediaType: application/json
        contentAddressed: true
        retention: run
    - id: approve_graph
      kind: human_gate
      objective: Approve the first implementation graph before allocating writer worktrees.
      dependsOn:
      - ground_architecture
      inputs:
      - from: ground_architecture
        name: graph-delta
        required: true
      approval:
        prompt: Review scope, budgets, write sets, security boundaries, and acceptance gates for the proposed implementation
          graph.
        requiredRole: operator
        expiresAfterSeconds: 86400
        onExpiry: pause
    - id: implement_event_kernel
      kind: agent
      objective: Implement append-only events, projections, leases, idempotency keys, and restart reconciliation.
      dependsOn:
      - approve_graph
      execution:
        provider: codex
        role: implementer
        modelProfile: coding
        threadPolicy: fresh
        forkPolicy: none
        sandbox: workspace_write
        approvalProfile: workspace_only
        subagents:
          mode: read_only
          maxThreads: 2
          maxDepth: 1
          requireExplicitForkNone: true
          allowedRoles:
          - explorer
          - test_reviewer
      workspace:
        mode: worktree
        baseRef: HEAD
        branchPrefix: orchestra/r2-events
        writeSet:
        - orchestra/domain/**
        - orchestra/store/**
        - tests/store/**
        cleanup: retain
      context:
        strategy: manifest
        includeArtifacts:
        - graph-delta
        - capability-profile
        includeDecisions: true
        includeRawTranscript: false
        maxInputTokens: 40000
      retry:
        maxAttempts: 3
        backoff: exponential
        baseDelaySeconds: 5
        retryOn:
        - infrastructure
        - rate_limit
        - timeout
        - verification_failure
      assurance:
        risk: high
        requiredGates:
        - unit-tests
        - restart-tests
        - idempotency-tests
        independentReviewer: true
        independentVerifier: true
        evidenceRequired: true
      stop:
        onSuccess: true
        maxRepairRounds: 2
        noProgressRounds: 2
        onBudgetExhaustion: request_approval
      nodeBudget:
        tokenBudget: 120000
        wallTimeSeconds: 7200
        maxSubagents: 4
      produces:
      - name: candidate-commit
        mediaType: application/vnd.git.commit
        contentAddressed: true
        retention: project
      - name: test-evidence
        mediaType: application/json
        contentAddressed: true
        retention: project
    - id: implement_codex_gateway
      kind: agent
      objective: Implement the Python SDK/App Server adapter, capability guards, event mapping, and structured turn
        results.
      dependsOn:
      - approve_graph
      execution:
        provider: codex
        role: implementer
        modelProfile: coding
        threadPolicy: fresh
        forkPolicy: none
        sandbox: workspace_write
        approvalProfile: workspace_only
        subagents:
          mode: read_only
          maxThreads: 3
          maxDepth: 1
          requireExplicitForkNone: true
          allowedRoles:
          - sdk_explorer
          - protocol_reviewer
      workspace:
        mode: worktree
        baseRef: HEAD
        branchPrefix: orchestra/r2-codex
        writeSet:
        - orchestra/codex/**
        - tests/codex/**
        cleanup: retain
      context:
        strategy: manifest
        includeArtifacts:
        - capability-profile
        - graph-delta
        includeDecisions: true
        includeRawTranscript: false
        maxInputTokens: 50000
      retry:
        maxAttempts: 3
        backoff: exponential
        baseDelaySeconds: 5
        retryOn:
        - infrastructure
        - rate_limit
        - timeout
        - verification_failure
      assurance:
        risk: high
        requiredGates:
        - sdk-contract-tests
        - protocol-fixtures
        - interrupt-resume-tests
        independentReviewer: true
        independentVerifier: true
        evidenceRequired: true
      stop:
        onSuccess: true
        maxRepairRounds: 2
        noProgressRounds: 2
        onBudgetExhaustion: request_approval
      nodeBudget:
        tokenBudget: 140000
        wallTimeSeconds: 7200
        maxSubagents: 5
      produces:
      - name: candidate-commit
        mediaType: application/vnd.git.commit
        contentAddressed: true
        retention: project
      - name: contract-evidence
        mediaType: application/json
        contentAddressed: true
        retention: project
    - id: implement_workspace_manager
      kind: agent
      objective: Port Symphony's safe workspace lifecycle into a provider-neutral worktree/container manager.
      dependsOn:
      - approve_graph
      execution:
        provider: codex
        role: implementer
        modelProfile: coding
        threadPolicy: fresh
        forkPolicy: none
        sandbox: workspace_write
        approvalProfile: workspace_only
        subagents:
          mode: read_only
          maxThreads: 2
          maxDepth: 1
          requireExplicitForkNone: true
          allowedRoles:
          - symphony_explorer
          - security_reviewer
      workspace:
        mode: worktree
        baseRef: HEAD
        branchPrefix: orchestra/r2-workspaces
        writeSet:
        - orchestra/workspace/**
        - tests/workspace/**
        cleanup: retain
      context:
        strategy: manifest
        includeArtifacts:
        - graph-delta
        includeDecisions: true
        includeRawTranscript: false
        maxInputTokens: 40000
      retry:
        maxAttempts: 3
        backoff: exponential
        baseDelaySeconds: 5
        retryOn:
        - infrastructure
        - timeout
        - verification_failure
      assurance:
        risk: high
        requiredGates:
        - path-safety-tests
        - worktree-lifecycle-tests
        - symlink-escape-tests
        independentReviewer: true
        independentVerifier: true
        evidenceRequired: true
      stop:
        onSuccess: true
        maxRepairRounds: 2
        noProgressRounds: 2
        onBudgetExhaustion: request_approval
      nodeBudget:
        tokenBudget: 100000
        wallTimeSeconds: 7200
        maxSubagents: 4
      produces:
      - name: candidate-commit
        mediaType: application/vnd.git.commit
        contentAddressed: true
        retention: project
      - name: security-evidence
        mediaType: application/json
        contentAddressed: true
        retention: project
    - id: integration_merge
      kind: merge
      objective: Integrate accepted candidate commits in a deterministic order and reject conflicts or stale bases.
      dependsOn:
      - implement_event_kernel
      - implement_codex_gateway
      - implement_workspace_manager
      inputs:
      - from: implement_event_kernel
        name: candidate-commit
        required: true
      - from: implement_codex_gateway
        name: candidate-commit
        required: true
      - from: implement_workspace_manager
        name: candidate-commit
        required: true
      workspace:
        mode: worktree
        baseRef: HEAD
        branchPrefix: orchestra/r2-integration
        writeSet:
        - '**'
        cleanup: retain
      retry:
        maxAttempts: 2
        backoff: fixed
        baseDelaySeconds: 1
        retryOn:
        - merge_conflict
        - infrastructure
      assurance:
        risk: high
        requiredGates:
        - clean-merge
        - full-test-suite
        independentReviewer: false
        independentVerifier: true
        evidenceRequired: true
      produces:
      - name: integrated-commit
        mediaType: application/vnd.git.commit
        contentAddressed: true
        retention: project
    - id: independent_verification
      kind: evaluator
      objective: Run contract, restart, chaos, security, and end-to-end checks against the integrated candidate
        without modifying production source.
      dependsOn:
      - integration_merge
      inputs:
      - from: integration_merge
        name: integrated-commit
        required: true
      execution:
        provider: codex
        role: verifier
        modelProfile: verification
        threadPolicy: fresh
        forkPolicy: none
        sandbox: workspace_write
        approvalProfile: test_only
        subagents:
          mode: read_only
          maxThreads: 4
          maxDepth: 1
          requireExplicitForkNone: true
          allowedRoles:
          - test_runner
          - security_reviewer
          - failure_injector
      workspace:
        mode: worktree
        baseRef: HEAD
        branchPrefix: orchestra/r2-verify
        writeSet:
        - .orchestra/evidence/**
        - test-results/**
        cleanup: retain
      context:
        strategy: manifest
        includeArtifacts:
        - integrated-commit
        includeDecisions: true
        includeRawTranscript: false
        maxInputTokens: 35000
      assurance:
        risk: critical
        requiredGates:
        - all-tests
        - restart-recovery
        - duplicate-dispatch
        - secret-isolation
        - workspace-escape
        independentReviewer: false
        independentVerifier: true
        evidenceRequired: true
      stop:
        onSuccess: true
        maxRepairRounds: 0
        noProgressRounds: 1
        onBudgetExhaustion: pause
      nodeBudget:
        tokenBudget: 80000
        wallTimeSeconds: 5400
        maxSubagents: 8
      produces:
      - name: verification-report
        mediaType: application/json
        contentAddressed: true
        retention: permanent
    - id: publish_candidate
      kind: publish
      objective: Create the review handoff only after independent verification is accepted.
      dependsOn:
      - independent_verification
      inputs:
      - from: integration_merge
        name: integrated-commit
        required: true
      - from: independent_verification
        name: verification-report
        required: true
      approval:
        prompt: Approve publishing the verified candidate as a draft pull request or equivalent review artifact.
        requiredRole: operator
        expiresAfterSeconds: 86400
        onExpiry: pause
