# Codex Orchestra — bounded hierarchical Multi-Agent V2 defaults.
# /root owns global phase/state/operator coordination. Selected branch owners
# may spawn only the child archetypes allowed by collaboration-v2.yaml and only
# under a recorded Delegation Permit.
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"

[features.multi_agent_v2]
enabled = true
hide_spawn_agent_metadata = false
expose_spawn_agent_model_overrides = true
# Ten live threads support two small workstreams while preserving control and
# verification capacity. Policy ceilings below are stricter than raw capacity.
max_concurrent_threads_per_session = 10
min_wait_timeout_ms = 1000
default_wait_timeout_ms = 30000
max_wait_timeout_ms = 300000
non_code_mode_only = false
tool_namespace = "collaboration"

[agents]
max_threads = 10
# root(0) -> manager/architect/governor(1) -> team leader/service(2)
# -> worker/reviewer/verifier(3). Workers have no spawn authority.
max_depth = 3
job_max_runtime_seconds = 1800
interrupt_message = true
