version: 2
stable_role_archetypes:
  - id: consultant
    kind: grounding_judgment
    authority: product_problem_scope_and_assurance
    default_parent: root
    default_lifetime: project
  - id: delivery_architect
    kind: delivery_design
    authority: milestones_workstreams_dependencies_interfaces_integration_evidence
    default_parent: root
    default_lifetime: phase
  - id: manager
    kind: people_and_decisions
    authority: team_leaders_staffing_capacity_priority_checkpoints
    default_parent: root
    default_lifetime: project
  - id: role_architect
    kind: role_compiler
    authority: approved_role_card_authoring
    default_parent: manager
    default_lifetime: project_service
  - id: team_leader
    kind: technical_leadership_and_execution
    authority: tactical_wave_squad_review_integration_and_hardest_work
    default_parent: manager
    default_lifetime: workstream
  - id: context_engineer
    kind: context_compiler
    authority: context_capsule_authoring_only
    default_parent: team_leader
    default_lifetime: workstream_service
  - id: quality_governor
    kind: assurance
    authority: gate_derivation_verifier_branch_and_verdict
    default_parent: root
    default_lifetime: project
leaf_archetypes:
  - id: explorer_terra
    mode: read_only_repository_evidence
  - id: advisor_sol
    mode: read_only_high_judgment_second_opinion
  - id: reviewer_terra
    mode: independent_bounded_review
  - id: worker_luna
    mode: clear_mechanical_implementation
  - id: worker_terra
    mode: default_implementation
  - id: worker_sol
    mode: difficult_or_high_consequence_implementation
  - id: verifier_terra
    mode: independent_executable_verification
role_creation_rule: Assignment-specific expertise is a Role Card overlay on a stable archetype. Promote to a new persistent TOML only after at least three recurring waves or cross-milestone continuity, a passing eval, and Manager/Operator approval.
runtime_lifecycle:
  project_resident: [consultant, manager, quality_governor]
  phase_resident: [delivery_architect]
  workstream_resident: [team_leader]
  branch_service_resident: [role_architect, context_engineer]
  task_scoped: [explorer_terra, advisor_sol, reviewer_terra, worker_luna, worker_terra, worker_sol, verifier_terra]
  note: Persistent identity is TOML plus canonical path, durable role memory, and roster events; V2 may unload/restore the thread and transcripts are not authoritative memory.
