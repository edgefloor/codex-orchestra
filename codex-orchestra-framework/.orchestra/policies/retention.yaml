version: 1
artifacts:
  successful_task_logs_days: 14
  failed_task_logs_days: 30
  accepted_gate_evidence_days: 90
  regulated_override: governed_by_external_standard
worktrees:
  keep_until: integration_or_explicit_abandonment
  failed_attempts: retain_until_root_cause_or_supersession
threads:
  persist_ids_for_resumption: true
  compact_role_memory: true
  full_transcript_is_not_canonical: true
secrets:
  store_in_events_or_capsules: false
