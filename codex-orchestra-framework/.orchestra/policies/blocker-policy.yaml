version: 1
allowed_categories:
  - missing_authority_or_credential
  - contradictory_binding_requirements
  - unavailable_mandatory_dependency
  - safety_or_policy_boundary
  - irreversible_decision_outside_authority
required_fields:
  - category
  - statement
  - evidence_refs
  - attempts
  - impact
  - owner
  - recommended_recovery
  - reversible_default
rejected_as_standalone_blockers:
  - unclear
  - need_more_context
  - not_sure
  - task_is_complex
  - tests_failed
  - waiting_for_another_agent_without_dependency_reference
rules:
  - Questions answerable from repository evidence or available tools must be investigated first.
  - Failed acceptance is a semantic task result unless one of the allowed blocker categories applies.
  - Reversible local ambiguity uses the capsule default and is recorded as an assumption.
  - Blockers have an owner and next action; they are never status labels without a recovery path.
