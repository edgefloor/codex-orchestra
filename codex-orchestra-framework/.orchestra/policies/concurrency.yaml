version: 2
max_threads: 10
max_depth: 3
max_active_team_leaders: 2
max_new_children_per_team_leader_wave: 3
max_parallel_writers_per_workstream: 2
max_parallel_writers_global: 4
max_read_only_children_per_analysis_branch: 4
max_dynamic_workflow_nodes_without_override: 12
capacity_partitions:
  root_and_manager_control: 2
  team_leaders_or_integrators: 2
  execution_or_read_workers: 4
  quality_or_emergency: 2
rules:
  - id: parent-owned-join
    statement: The agent that spawns a child owns its wait, join, first-line review, and bounded upward report.
  - id: manager-people-only
    statement: The Manager may spawn or wake Team Leaders and its Role Architect, but never workers, reviewers, verifiers, or context compilers.
  - id: delegated-squad-authority
    statement: A Team Leader may spawn approved branch-local workers only with a current Delegation Permit, Role Card where needed, Context Capsule, and reserved capacity.
  - id: no-leaf-fanout
    statement: Workers, reviewers, verifiers, explorers, advisors, context engineers, and role architects may not spawn descendants.
  - id: reserve-control-capacity
    statement: At least one control slot and one quality/emergency slot remain available while execution is active.
  - id: disjoint-write-domains
    statement: Concurrent write tasks require non-overlapping declared write domains and isolated worktrees.
  - id: serialized-integration
    statement: Each workstream has one Team Leader-owned integration queue; cross-workstream integration has one named owner.
  - id: event-driven-v2
    statement: Parents use wait_agent and completion/mailbox events; no agent polls other agents or filesystem queues.
  - id: explicit-fanout-budget
    statement: Every workflow declares child and concurrency limits, a join owner, reserved review capacity, and a checkpoint.
  - id: no-hidden-ultra
    statement: Ultra or equivalent autonomous recursive modes require an exceptional permit and are never embedded in a leaf role.
leases:
  default_ttl_seconds: 900
  heartbeat_interval_seconds: 120
  grace_seconds: 60
  late_results: retain_as_evidence_but_reject_state_transition
